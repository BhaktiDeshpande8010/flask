<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    {% include 'navbar.html' %}

    <form action="{{ url_for('profileupdate') }}" method="POST">
        <fieldset style="width: 50%;">
            <h1>Upadate form</h1>
            <center>
                <input type="hidden" name="id" value="{{data[0]}}">
                <input type="text" placeholder="Enter Your Fullname" name="name" value="{{data[1]}}">
                <br><br>
                <input type="email" placeholder="Enter Email" name="email" value="{{data[2]}}">
                <br><br>
                <input type="password" placeholder="Enter your password" name="password" value="{{data[3]}}">
                <br><br>
                <input type="tel" placeholder="Contact Number" name="contact" value="{{data[4]}}">
                <br> <br>
                <button type="submit" class="btn btn-primary">Update</button>
        </fieldset>
    </form>
    </center>
</body>

</html>
