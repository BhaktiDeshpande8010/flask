<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Student</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body {
            background: #f4f6f9;
        }

        .update-card {
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0px 5px 20px rgba(0, 0, 0, 0.1);
            margin-top: 70px;
        }
    </style>
</head>

<body>

    {% include 'navbar.html' %}

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="update-card">
                    <h2 class="text-center mb-4">Update Student</h2>

                    
                    <form action="{{ url_for('profileupdate') }}" method="POST">

                        <input type="hidden" name="id" value="{{data[0]}}">

                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Enter Fullname" name="name"value="{{data[1]}}">               
                        </div>

                        <div class="mb-3">
                            <input type="email" class="form-control" placeholder="Enter Email" name="email" value="{{data[2]}}">
                        </div>

                        <div class="mb-3">
                            <input type="password" class="form-control" placeholder="Enter Password" name="password" value="{{data[3]}}">                       
                        </div>

                        <div class="mb-3">
                            <input type="tel" class="form-control" placeholder="Enter Contact" name="contact" value="{{data[4]}}">                               
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Update Student</button>
                                 
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
