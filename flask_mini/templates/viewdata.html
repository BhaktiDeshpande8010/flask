<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    {% include 'navbar.html' %}
    <h1>Registraion page</h1>

    <table class="table table-bordered table-striped">
        <tr>
            <th>ID</th>
            <th>Fullname</th>
            <th>Email</th>
            <th>Password</th>
            <th>Contact</th>
            <th>Action</th>
        </tr>

        {% for i in s_data %}
        <tr>
            <td>{{i[0]}}</td>
            <td>{{i[1]}}</td>
            <td>{{i[2]}}</td>
            <td>{{i[3]}}</td>
            <td>{{i[4]}}</td>
            <td>
                <a href="deletestudent/{{i[0]}}" class="btn btn-danger" onclick="confirm('Are you sure')">Delete</a>
                <a href="updatestudent/{{i[0]}}" class="btn btn-primary">Update</a>
            </td>
        </tr>
        {% endfor %}

    </table>
</body>

</html>
