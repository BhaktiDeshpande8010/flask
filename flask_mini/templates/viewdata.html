<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Data</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body{
            background:#f4f6f9;
        }

        .table-box{
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.1);
            margin-top:40px;
        }
    </style>
</head>

<body>

    {% include 'navbar.html' %}

    <div class="container">

        <div class="table-box">

            <h2 class="text-center mb-4">
                Student Records
            </h2>

            <table class="table table-bordered table-striped table-hover">

                <tr class="table-dark">
                    <th>ID</th>
                    <th>Fullname</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>Contact</th>
                    <th>Action</th>
                </tr>

                {% for i in s_data %}

                <tr>
                    <td>{{i[0]}}</td>
                    <td>{{i[1]}}</td>
                    <td>{{i[2]}}</td>
                    <td>{{i[3]}}</td>
                    <td>{{i[4]}}</td>

                    <td>
                        <a href="deletestudent/{{i[0]}}"
                        class="btn btn-danger btn-sm"
                        onclick="return confirm('Are you sure?')">
                            Delete
                        </a>

                        <a href="updatestudent/{{i[0]}}"
                        class="btn btn-primary btn-sm">
                            Update
                        </a>
                    </td>
                </tr>

                {% endfor %}

            </table>

        </div>

    </div>

</body>
</html>
