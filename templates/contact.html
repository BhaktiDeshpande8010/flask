<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }
    </style>
</head>

<body>
    {% include 'navbar.html '%}

    <div class="container">
        <h2>Contact Us</h2>

        <form>
            <input type="text" placeholder="Enter your name">

            <input type="email" placeholder="Enter your email">

            <textarea rows="5" placeholder="Enter your message"></textarea>

            <button type="submit">Send</button>
        </form>
    </div>


    <!-- witing python logic in html file  -->
    {% if num1 % 2 == 0 %}
    <p>This is an even number</p>

    {% else %}
    <p>This is an odd number</p>
    
    {% endif %}
</body>

</html>
